name: Preview Deployment

on:
  pull_request:
    branches:
      - main
      - development
      - 'feature/**'
    paths:
      - 'web/**'
      - 'data/**'
      - 'python/**'
      - '.github/workflows/preview.yml'

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  RESUME_FILENAME_BASE: 'kenzik-resume'

jobs:
  preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write  # To comment preview URL on PR
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ========================================
      # Python: Build Resume Documents
      # ========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python/requirements.txt
      
      - name: Install Python dependencies
        working-directory: python
        run: pip install -r requirements.txt
      
      - name: Build resume documents
        working-directory: python
        env:
          # Use secrets if available, otherwise use placeholder values for preview
          RESUME_NAME: ${{ secrets.RESUME_NAME || 'Preview Name' }}
          RESUME_CITY_STATE: ${{ secrets.RESUME_CITY_STATE || 'City, State' }}
          RESUME_PHONE: ${{ secrets.RESUME_PHONE || '555-555-5555' }}
          RESUME_EMAIL: ${{ secrets.RESUME_EMAIL || 'preview@example.com' }}
          RESUME_LINKEDIN: ${{ secrets.RESUME_LINKEDIN || 'linkedin.com/in/user' }}
        run: |
          python build_resume.py \
            --format all \
            --reveal-pii \
            --name "${{ env.RESUME_FILENAME_BASE }}" \
            --source ../data/kenzik.yml
      
      - name: Copy resume files to web public folder
        run: |
          mkdir -p web/public/downloads
          cp python/${{ env.RESUME_FILENAME_BASE }}.pdf web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.docx web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.md web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.rtf web/public/downloads/
          echo "Resume files copied to web/public/downloads/"
          ls -la web/public/downloads/
      
      # ========================================
      # Node.js: Build Web Application
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock
      
      - name: Install dependencies
        working-directory: web
        run: yarn install --frozen-lockfile
      
      - name: Build application
        working-directory: web
        env:
          # Use placeholder values for preview builds
          VITE_RESUME_NAME: ${{ secrets.VITE_RESUME_NAME || 'Preview Build' }}
          VITE_RESUME_CITY_STATE: ${{ secrets.VITE_RESUME_CITY_STATE || 'City, State' }}
          VITE_RESUME_LINKEDIN: ${{ secrets.VITE_RESUME_LINKEDIN || 'linkedin.com/in/user' }}
          VITE_RESUME_GITHUB: ${{ secrets.VITE_RESUME_GITHUB || 'github.com/user' }}
          VITE_RESUME_FILENAME_BASE: ${{ env.RESUME_FILENAME_BASE }}
        run: yarn build
      
      # ========================================
      # Deploy Preview to Cloudflare Pages
      # ========================================
      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'kenzik-resume' }}
          directory: web/dist/spa
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Preview deployment uses branch name
          branch: ${{ github.head_ref }}
      
      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = '${{ github.event.pull_request.head.sha }}';
            const shortSha = sha.substring(0, 7);
            const body = `## 🚀 Preview Deployment Ready!\n\n` +
              `**Preview URL:** ${url}\n\n` +
              `**Resume Downloads:**\n` +
              `- [PDF](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.pdf)\n` +
              `- [DOCX](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.docx)\n` +
              `- [Markdown](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.md)\n` +
              `- [RTF](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.rtf)\n\n` +
              `This preview was built from commit \`${shortSha}\``;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment Ready')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
