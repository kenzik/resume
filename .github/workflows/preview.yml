name: Preview Deployment

on:
  pull_request:
    branches:
      - main
      - development
      - 'feature/**'
    paths:
      - 'web/**'
      - 'data/**'
      - 'python/**'
      - '.github/workflows/preview.yml'
  
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      branch:
        description: 'Branch to deploy (defaults to current branch)'
        required: false
        type: string

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  RESUME_FILENAME_BASE: 'kenzik-resume'

jobs:
  preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write  # To comment preview URL on PR
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ========================================
      # Create Private Resume Data from Secret
      # ========================================
      - name: Create resume data file
        run: |
          mkdir -p data
          echo "${{ secrets.RESUME_YAML_B64 }}" | base64 -d > data/kenzik.yml
          echo "Resume data file created from secret"
      
      # ========================================
      # Python: Build Resume Documents
      # ========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python/requirements.txt
      
      - name: Install Python dependencies
        working-directory: python
        run: pip install -r requirements.txt
      
      - name: Debug - Check secrets availability
        run: |
          echo "Checking if secrets are available (will show 'set' or 'not set'):"
          if [ -n "${{ secrets.RESUME_NAME }}" ]; then echo "RESUME_NAME: set"; else echo "RESUME_NAME: not set"; fi
          if [ -n "${{ secrets.RESUME_EMAIL }}" ]; then echo "RESUME_EMAIL: set"; else echo "RESUME_EMAIL: not set"; fi
          if [ -n "${{ secrets.RESUME_PHONE }}" ]; then echo "RESUME_PHONE: set"; else echo "RESUME_PHONE: not set"; fi
          if [ -n "${{ secrets.RESUME_CITY_STATE }}" ]; then echo "RESUME_CITY_STATE: set"; else echo "RESUME_CITY_STATE: not set"; fi
          if [ -n "${{ secrets.RESUME_LINKEDIN }}" ]; then echo "RESUME_LINKEDIN: set"; else echo "RESUME_LINKEDIN: not set"; fi
      
      - name: Build resume documents
        working-directory: python
        env:
          RESUME_NAME: ${{ secrets.RESUME_NAME }}
          RESUME_CITY_STATE: ${{ secrets.RESUME_CITY_STATE }}
          RESUME_PHONE: ${{ secrets.RESUME_PHONE }}
          RESUME_EMAIL: ${{ secrets.RESUME_EMAIL }}
          RESUME_LINKEDIN: ${{ secrets.RESUME_LINKEDIN }}
        run: |
          python build_resume.py \
            --format all \
            --reveal-pii \
            --name "${{ env.RESUME_FILENAME_BASE }}" \
            --source ../data/kenzik.yml
      
      - name: Copy resume files to web public folder
        run: |
          mkdir -p web/public/downloads
          cp python/${{ env.RESUME_FILENAME_BASE }}.pdf web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.docx web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.md web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.rtf web/public/downloads/
          echo "Resume files copied to web/public/downloads/"
          ls -la web/public/downloads/
      
      # ========================================
      # Node.js: Build Web Application
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock
      
      - name: Install dependencies
        working-directory: web
        run: yarn install --frozen-lockfile
      
      - name: Build application
        working-directory: web
        env:
          VITE_RESUME_NAME: ${{ secrets.VITE_RESUME_NAME }}
          VITE_RESUME_CITY_STATE: ${{ secrets.VITE_RESUME_CITY_STATE }}
          VITE_RESUME_LINKEDIN: ${{ secrets.VITE_RESUME_LINKEDIN }}
          VITE_RESUME_GITHUB: ${{ secrets.VITE_RESUME_GITHUB }}
          VITE_RESUME_FILENAME_BASE: ${{ env.RESUME_FILENAME_BASE }}
        run: yarn build
      
      # ========================================
      # Deploy Preview to Cloudflare Pages
      # ========================================
      - name: Deploy Preview to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'kenzik-resume' }}
          directory: web/dist/spa
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Preview deployment uses branch name (PR head_ref or manual input or current ref)
          branch: ${{ github.head_ref || inputs.branch || github.ref_name }}
      
      - name: Print Preview URL (Manual Dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "## 🚀 Preview Deployment Ready!"
          echo ""
          echo "**Preview URL:** ${{ steps.deploy.outputs.url }}"
          echo ""
          echo "**Resume Downloads:**"
          echo "- PDF: ${{ steps.deploy.outputs.url }}/downloads/${{ env.RESUME_FILENAME_BASE }}.pdf"
          echo "- DOCX: ${{ steps.deploy.outputs.url }}/downloads/${{ env.RESUME_FILENAME_BASE }}.docx"
          echo "- Markdown: ${{ steps.deploy.outputs.url }}/downloads/${{ env.RESUME_FILENAME_BASE }}.md"
          echo "- RTF: ${{ steps.deploy.outputs.url }}/downloads/${{ env.RESUME_FILENAME_BASE }}.rtf"
      
      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = '${{ github.event.pull_request.head.sha }}';
            const shortSha = sha.substring(0, 7);
            const body = `## 🚀 Preview Deployment Ready!\n\n` +
              `**Preview URL:** ${url}\n\n` +
              `**Resume Downloads:**\n` +
              `- [PDF](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.pdf)\n` +
              `- [DOCX](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.docx)\n` +
              `- [Markdown](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.md)\n` +
              `- [RTF](${url}/downloads/${{ env.RESUME_FILENAME_BASE }}.rtf)\n\n` +
              `This preview was built from commit \`${shortSha}\``;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Deployment Ready')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
