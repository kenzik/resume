name: Test Suite

on:
  push:
    branches: [development, 'feature/**', 'test/**', 'fix/**']
    paths:
      - 'web/**'
      - 'data/example.yml'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [development]

jobs:
  unit:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Provision test data: example.yml is the public template; kenzik.yml is
      # a gitignored secret and must NEVER be used in CI test runs.
      # The webServer in playwright.config.ts already sets
      # VITE_RESUME_YAML_PATH=/data/example.yml which points at
      # web/public/data/example.yml (committed, no personal data).
      - name: Verify example.yml is present (not kenzik.yml)
        run: |
          test -f public/data/example.yml || (echo "ERROR: web/public/data/example.yml missing" && exit 1)
          echo "OK: example.yml present"

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      # test-results/ contains the actual-screenshot PNGs when a snapshot
      # comparison fails.  Uploading them lets us download the linux render
      # with `gh run download` and commit it as the linux baseline.
      # This step is permanent good practice — diff evidence on every failure.
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7

  build-and-perf:
    name: Build + Performance Budget
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # The build step copies data/kenzik.yml into dist/spa/data/.
      # In CI, kenzik.yml is a secret — copy example.yml in its place so the
      # afterBuild hook succeeds without ever touching personal data.
      - name: Provision build data (example.yml only, no personal data)
        run: cp ../data/example.yml ../data/kenzik.yml
        working-directory: web

      - name: Build production bundle
        run: yarn build
        env:
          VITE_RESUME_YAML_PATH: /data/example.yml

      # ── Performance budget: app JS + CSS ≤ 250 KB transfer size (gzip) ────
      # assets/ contains only app JS+CSS; public/games stays out by construction.
      - name: Check performance budget (≤ 250 KB JS+CSS, excluding games)
        run: |
          TOTAL=0
          while IFS= read -r -d '' file; do
            SIZE=$(gzip -c "$file" | wc -c)
            TOTAL=$((TOTAL + SIZE))
          done < <(find dist/spa/assets \( -name "*.js" -o -name "*.css" \) -print0)
          KB=$((TOTAL / 1024))
          echo "App JS+CSS gzip transfer size: ${KB} KB"
          if [ "$TOTAL" -gt $((250 * 1024)) ]; then
            echo "ERROR: Performance budget exceeded — ${KB} KB > 250 KB (gzip)"
            exit 1
          fi
          echo "OK: ${KB} KB ≤ 250 KB (gzip)"

      # ── Precache policy gate (§10 Offline Doctrine) ─────────────────────────
      # Asserts the workbox precache manifest in sw.js satisfies §10 rules:
      #   (a) zero games/ entries (11 MB FreeDoom bundle must never be precached)
      #   (b) index.html + at least one assets/*.js entry are present
      #   (c) total precache gzip payload ≤ 1 MB (§10: "well under a megabyte")
      #   (d) sw.js and manifest.json exist in dist/spa
      #
      # Method: extract {url:"..."} entries with Node regex (no extra deps),
      # then gzip-c each file and sum.  This is an approximation — it is the
      # on-disk gzip size, not the HTTP transfer size — but it is conservative
      # (brotli would be smaller) and sufficient for a budget gate.
      - name: Precache policy gate (§10 — no games, ≤ 1 MB, sw.js + manifest.json present)
        run: |
          # (d) Existence check first — loud failure if build is broken
          test -f dist/spa/sw.js       || (echo "ERROR: dist/spa/sw.js missing"        && exit 1)
          test -f dist/spa/manifest.json || (echo "ERROR: dist/spa/manifest.json missing" && exit 1)
          echo "OK: sw.js and manifest.json present"

          # Extract precache URL list from sw.js via Node regex
          URLS=$(node -e "
          const fs = require('fs');
          const sw = fs.readFileSync('dist/spa/sw.js', 'utf8');
          const urls = [];
          const re = /\{url:\"([^\"]+)\"/g;
          let m;
          while ((m = re.exec(sw)) !== null) urls.push(m[1]);
          urls.forEach(u => console.log(u));
          ")

          if [ -z "$URLS" ]; then
            echo "ERROR: No precache URLs found in sw.js — manifest may be empty"
            exit 1
          fi

          # (a) No games/ entries in precache
          if echo "$URLS" | grep -q 'games/'; then
            echo "ERROR: games/ URL(s) found in precache manifest (§10 violation):"
            echo "$URLS" | grep 'games/'
            exit 1
          fi
          echo "OK: No games/ entries in precache manifest"

          # (b) index.html and at least one assets/*.js are present
          if ! echo "$URLS" | grep -q '^index\.html$'; then
            echo "ERROR: index.html not found in precache manifest"
            exit 1
          fi
          if ! echo "$URLS" | grep -qE '^assets/.*\.js$'; then
            echo "ERROR: No assets/*.js entry found in precache manifest"
            exit 1
          fi
          echo "OK: index.html and assets/*.js are in precache manifest"

          # (c) Total precache gzip payload ≤ 1 MB
          # Sum gzip -c size for every precache URL that resolves to an
          # on-disk file.  Files absent from disk are skipped with a warning
          # (shouldn't happen in a healthy build).
          TOTAL=0
          while IFS= read -r url; do
            file="dist/spa/$url"
            if [ -f "$file" ]; then
              SIZE=$(gzip -c "$file" | wc -c)
              TOTAL=$((TOTAL + SIZE))
            else
              echo "WARN: precache entry not found on disk: $url"
            fi
          done <<< "$URLS"
          KB=$((TOTAL / 1024))
          echo "Precache gzip payload: ${KB} KB (sum of gzip-compressed precached files)"
          if [ "$TOTAL" -gt $((1024 * 1024)) ]; then
            echo "ERROR: Precache payload ${KB} KB > 1024 KB (§10 budget exceeded)"
            exit 1
          fi
          echo "OK: Precache payload ${KB} KB <= 1024 KB"

      # ── Obfuscation check: no plaintext easter-egg triggers in dist ──────────
      # Asserts exactly the five obfuscated launch-trigger strings are absent
      # from built assets: xyzzy, plugh, iddqd, idkfa, idspispopd.
      # "joshua" is the WOPR in-game password — it ships in plaintext by design
      # (game logic string comparison) and must NOT be included in this gate.
      # Trigger strings are reconstructed from hex escapes (never stored as
      # literals here) so this workflow file itself stays clean under grep.
      - name: Verify easter-egg triggers are obfuscated in dist
        run: |
          # Reconstruct trigger strings from hex byte values (no plaintext literals)
          T1=$(printf '%b' '\x78\x79\x7a\x7a\x79')
          T2=$(printf '%b' '\x70\x6c\x75\x67\x68')
          T3=$(printf '%b' '\x69\x64\x64\x71\x64')
          T4=$(printf '%b' '\x69\x64\x6b\x66\x61')
          T5=$(printf '%b' '\x69\x64\x73\x70\x69\x73\x70\x6f\x70\x64')
          FOUND=$(grep -rl "$T1\|$T2\|$T3\|$T4\|$T5" dist/spa/assets/ 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Plaintext easter-egg triggers found in dist:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No plaintext triggers found in dist/spa/assets"

  offline-e2e:
    name: Offline E2E (PWA §10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Mirror the build-and-perf data provisioning exactly:
      # kenzik.yml is a gitignored secret; copy example.yml in its place so
      # the afterBuild hook (which copies kenzik.yml to dist/spa/data/) succeeds
      # without ever touching personal data.  The built app uses
      # VITE_RESUME_YAML_PATH=/data/example.yml so all YAML loads hit the public
      # example file (which is also precached by the SW).
      - name: Provision build data (example.yml only, no personal data)
        run: cp ../data/example.yml ../data/kenzik.yml

      - name: Build production PWA bundle
        run: yarn build
        env:
          VITE_RESUME_YAML_PATH: /data/example.yml

      - name: Run offline E2E tests
        run: yarn test:e2e:offline
        env:
          CI: true

      - name: Upload Playwright offline report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-offline-report
          path: web/playwright-report/
          retention-days: 7
