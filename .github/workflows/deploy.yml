name: Deploy to Cloudflare Pages

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'
  RESUME_FILENAME_BASE: 'kenzik-resume'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ========================================
      # Create Private Resume Data from Secret
      # ========================================
      - name: Create resume data file
        run: |
          mkdir -p data
          echo "${{ secrets.RESUME_YAML_B64 }}" | base64 -d > data/kenzik.yml
          echo "Resume data file created from secret"
      
      # ========================================
      # Python: Build Resume Documents
      # ========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python/requirements.txt
      
      - name: Install Python dependencies
        working-directory: python
        run: pip install -r requirements.txt
      
      - name: Build resume documents
        working-directory: python
        env:
          RESUME_NAME: ${{ secrets.RESUME_NAME }}
          RESUME_CITY_STATE: ${{ secrets.RESUME_CITY_STATE }}
          RESUME_PHONE: ${{ secrets.RESUME_PHONE }}
          RESUME_EMAIL: ${{ secrets.RESUME_EMAIL }}
          RESUME_LINKEDIN: ${{ secrets.RESUME_LINKEDIN }}
        run: |
          python build_resume.py \
            --format all \
            --reveal-pii \
            --name "${{ env.RESUME_FILENAME_BASE }}" \
            --source ../data/kenzik.yml
      
      - name: Copy resume files to web public folder
        run: |
          mkdir -p web/public/downloads
          cp python/${{ env.RESUME_FILENAME_BASE }}.pdf web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.docx web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.md web/public/downloads/
          cp python/${{ env.RESUME_FILENAME_BASE }}.rtf web/public/downloads/
          echo "Resume files copied to web/public/downloads/"
          ls -la web/public/downloads/
      
      # ========================================
      # Node.js: Build Web Application
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock
      
      - name: Install dependencies
        working-directory: web
        run: yarn install --frozen-lockfile
      
      - name: Build application
        working-directory: web
        env:
          VITE_RESUME_NAME: ${{ secrets.VITE_RESUME_NAME }}
          VITE_RESUME_CITY_STATE: ${{ secrets.VITE_RESUME_CITY_STATE }}
          VITE_RESUME_LINKEDIN: ${{ secrets.VITE_RESUME_LINKEDIN }}
          VITE_RESUME_GITHUB: ${{ secrets.VITE_RESUME_GITHUB }}
          VITE_RESUME_FILENAME_BASE: ${{ env.RESUME_FILENAME_BASE }}
        run: yarn build
      
      # ========================================
      # Deploy to Cloudflare Pages
      # ========================================
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist/spa --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'kenzik-resume' }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
