name: Deploy to Cloudflare Pages

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.1.3
  workflow_dispatch:  # Allow manual trigger from GitHub UI

env:
  NODE_VERSION: '22'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock
      
      - name: Install dependencies
        working-directory: web
        run: yarn install --frozen-lockfile
      
      - name: Build application
        working-directory: web
        env:
          VITE_RESUME_NAME: ${{ secrets.VITE_RESUME_NAME }}
          VITE_RESUME_CITY_STATE: ${{ secrets.VITE_RESUME_CITY_STATE }}
          VITE_RESUME_LINKEDIN: ${{ secrets.VITE_RESUME_LINKEDIN }}
          VITE_RESUME_GITHUB: ${{ secrets.VITE_RESUME_GITHUB }}
        run: yarn build
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PROJECT_NAME || 'kenzik-resume' }}
          directory: web/dist/spa
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Production deployment
          branch: main

