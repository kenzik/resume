    # Hi. I'm Dave. 👋
    ### Cloud-Native Architect | AI Infrastructure & Strategy | Full-Stack Engineer | Senior Technical Leader

    --------
    ## About Me

    I am a Senior Technologist with over **25 years of experience** bridging the gap 
    between executive business strategy and deep-tech engineering. My career has spanned 
    roles from **Founder/CTO** to **Senior Principal Architect** for all size companies, 
    including my recent position working with Fortune 50 enterprises.

    Currently, I am pivoting deeper into the **AI/ML Infrastructure** space. I don't just 
    want to *use* models; I want to architect the high-performance compute, RAG pipelines, 
    and scalable cloud systems that power them.

    I am actively pursuing **NVIDIA architecture certifications** and am looking for roles 
    that sit at the intersection of **High-Performance Computing (HPC), Cloud-Native 
    Infrastructure, and Applied AI**.

    --------

    ## Technical Arsenal
       - **AI & ML:** LangChain, RAG, Vertex AI, Pinecone, Redis Vector, Prompt Engineering
       - **Cloud & Infra:** Google Cloud Platform (GCP), Terraform (IaC), Docker
       - **High Scale:** Redis Streams/Cluster, WebSockets, Distributed Systems (Sub-20ms latency at scale)
       - **Languages:** Python, TypeScript, Node.js, Go, Bash 
       - **Leadership:** Solution Architecture, Technical Strategy, Team Mentorship, Agile/Scrum

